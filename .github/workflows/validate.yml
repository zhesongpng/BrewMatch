name: Validate COC Structure
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Validate structure
        run: |
          set -euo pipefail
          echo "Checking COC structure..."

          # Verify critical directories exist
          test -d .claude/agents && echo "✓ agents/"
          test -d .claude/skills && echo "✓ skills/"
          test -d .claude/rules && echo "✓ rules/"
          test -d .claude/commands && echo "✓ commands/"
          test -f CLAUDE.md && echo "✓ CLAUDE.md"

          # Check for contamination: src/kailash/ paths should not leak into
          # USE template .claude/ content EXCEPT for files on the allowlist.
          # Allowlist = files that legitimately guide developers working WITH
          # the kailash-py source tree (provenance, navigation, compliance).
          #
          # See .github/coc-sdk-refs-allowlist.txt to add exemptions.
          ALLOWLIST=.github/coc-sdk-refs-allowlist.txt
          if [ ! -f "$ALLOWLIST" ]; then
            echo "ERROR: missing $ALLOWLIST"
            exit 1
          fi

          # Strip comments/blanks from allowlist, sort for comm
          grep -vE '^\s*(#|$)' "$ALLOWLIST" | sort > /tmp/allowed.txt

          # Find all .claude/ files containing src/kailash/
          grep -rl "src/kailash/" .claude/ 2>/dev/null | sort > /tmp/found.txt || true

          # Compute: found \ allowed  (files with contamination not on allowlist)
          contamination=$(comm -23 /tmp/found.txt /tmp/allowed.txt)

          if [ -n "$contamination" ]; then
            echo ""
            echo "ERROR: src/kailash/ references found in files not on allowlist:"
            echo "$contamination" | sed 's/^/  /'
            echo ""
            echo "Fix options:"
            echo "  1. Remove the src/kailash/ reference (if it's an accidental leak), OR"
            echo "  2. Add the file path to $ALLOWLIST (if the file legitimately needs to"
            echo "     reference SDK source — e.g., provenance Origin: lines, compliance"
            echo "     tracking, or navigation skills that teach SDK layout)"
            exit 1
          fi

          echo "✓ No contamination detected (allowlist: $(wc -l < /tmp/allowed.txt) entries)"

          # Count agents and skills
          echo "Agents: $(find .claude/agents -name '*.md' | wc -l)"
          echo "Skills: $(find .claude/skills -name '*.md' | wc -l)"
          echo "Rules: $(find .claude/rules -name '*.md' | wc -l)"
          echo "Commands: $(find .claude/commands -name '*.md' | wc -l)"
          echo "All checks passed!"
