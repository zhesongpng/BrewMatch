services:
  - type: web
    name: brewmatch-brain
    runtime: python
    buildCommand: pip install -e ".[api]"
    startCommand: uvicorn api.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        sync: false # set manually in Render dashboard — points at Supabase
      # Optional: only the bean-label extractor reads these; the brain API
      # (recommend/diagnose/brew-log/learn) boots and runs without them.
      - key: LLM_API_KEY
        sync: false # OpenAI-compatible key for the bean extractor (optional)
      - key: LLM_MODEL
        sync: false # model name for the bean extractor, e.g. gpt-4o-mini (optional)
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: CUDA_VISIBLE_DEVICES
        value: ""
      - key: TOKENIZERS_PARALLELISM
        value: "false"
    # No persistent disk: recipe files ship in the repo (data/recipes/) and the
    # ChromaDB search index is rebuilt from them at every startup (~seconds).
    # A disk mounted over data/ would shadow the committed recipes and break boot.
